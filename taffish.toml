[package]
name = "spades"
kind = "tool"
version = "4.2.0"
release = 1
license = "Apache-2.0"
main = "src/main.taf"

[meta]
domain = "bio"
categories = ["genome-assembly", "metagenomics", "transcriptomics", "de-novo-assembly", "short-read"]
keywords = ["SPAdes", "metaSPAdes", "plasmidSPAdes", "rnaSPAdes", "metaviralSPAdes", "metaplasmidSPAdes", "coronaSPAdes", "BinSPreader", "PathRacer", "SPAligner", "Illumina", "IonTorrent", "hybrid assembly", "assembly graph", "k-mer"]
description = "SPAdes genome assembler toolkit for isolate, single-cell, metagenomic, transcriptomic, viral, plasmid, biosynthetic, sequence-to-graph alignment and related short-read assembly workflows."

[repository]
url = "https://github.com/taffish/spades"

[command]
name = "taf-spades"

[runtime]
pipe = true
command_mode = true

[container]
image = "ghcr.io/taffish/spades:4.2.0-r1"
dockerfile = "docker/Dockerfile"
build_platforms = "linux/amd64,linux/arm64"

[upstream]
name = "SPAdes"
type = "github"
repo = "ablab/spades"
homepage = "https://ablab.github.io/spades/"
manual = "https://ablab.github.io/spades/"
release_url = "https://github.com/ablab/spades/releases/tag/v4.2.0"
downloads = "https://github.com/ablab/spades/releases/download/v4.2.0/SPAdes-4.2.0.tar.gz"
version = "4.2.0"
license = "GPL-2.0-only"
citation = "Prjibelski et al. 2020; Bankevich et al. 2012; mode-specific SPAdes publications"
doi = "10.1002/cpbi.102; 10.1089/cmb.2012.0021"
pmid = "32559359; 22506599"
watch = "tags"
strip_prefix = "v"

[smoke]
backend = "docker"
timeout = 900
exist = ["spades.py", "metaspades.py", "plasmidspades.py", "rnaspades.py", "metaviralspades.py", "metaplasmidspades.py", "rnaviralspades.py", "coronaspades.py", "spades-core", "spades-hammer", "spades-kmercount", "spades-gbuilder", "spades-gsimplifier", "binspreader", "pathracer", "pathracer-seq-fs", "spaligner", "python3", "bash", "gzip", "bzip2", "xz"]
test = ["test \"$(cat /opt/spades/share/spades/VERSION)\" = '4.2.0' && spades.py --version 2>&1 | grep -F 'SPAdes genome assembler v4.2.0' >/dev/null", "spades.py --help 2>&1 | grep -F 'SPAdes genome assembler' >/dev/null && spades.py --help 2>&1 | grep -F -- '--isolate' >/dev/null && spades.py --help 2>&1 | grep -F -- '--meta' >/dev/null && metaspades.py --help 2>&1 | grep -i 'meta' >/dev/null", "plasmidspades.py --help 2>&1 | grep -i 'plasmid' >/dev/null && rnaspades.py --help 2>&1 | grep -i 'rna' >/dev/null && metaviralspades.py --help 2>&1 | grep -i 'viral' >/dev/null && coronaspades.py --help 2>&1 | grep -i 'corona' >/dev/null", "for x in spades-core spades-hammer spades-corrector-core spades-ionhammer spades-kmercount spades-kmer-estimating spades-read-filter spades-gbuilder spades-gmapper spades-gsimplifier spades-gfa-split binspreader pathracer pathracer-seq-fs spaligner; do command -v \"$x\" >/dev/null; ! ldd \"$(command -v \"$x\")\" 2>&1 | grep -F 'not found' >/dev/null; done", "rm -rf /tmp/taf-spades-test && mkdir -p /tmp/taf-spades-test && cd /tmp/taf-spades-test && spades.py --test -t 1 > run.log 2>&1 && test -s spades_test/contigs.fasta && test -s spades_test/scaffolds.fasta && grep -F 'TEST PASSED CORRECTLY' run.log >/dev/null"]
